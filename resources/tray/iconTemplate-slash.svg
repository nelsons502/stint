  Template image — macOS handles light/dark inversion.
  Authored at 64×22; rasterized by scripts/build-icons.mjs.
-->
<svg width="64" height="22" viewBox="0 0 64 22" xmlns="http://www.w3.org/2000/svg">
  <text
    x="1"
    y="18"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="900"
    fill="#000000"
    letter-spacing="-0.5"
  >stint</text>
  <line
    x1="58"
    y1="1"
    x2="42"
    y2="21"
    stroke="#000000"
    stroke-width="2.5"
    stroke-linecap="round"
  />
</svg>
