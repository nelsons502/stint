<!--
  Stint tray icon: lowercase "stint" wordmark.

  Template image — fill is black; macOS inverts it automatically for
  light/dark menubar. Authored at 64×22; rasterized to proportional PNGs
  by scripts/build-icons.mjs (16px and 32px tall, width auto).
-->
<svg width="64" height="22" viewBox="0 0 64 22" xmlns="http://www.w3.org/2000/svg">
  <text
    x="1"
    y="18"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="900"
    fill="#000000"
    letter-spacing="-0.5"
  >stint</text>
</svg>
